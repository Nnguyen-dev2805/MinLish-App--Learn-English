<style>

            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;

        }

<body class="flex flex-col min-h-screen text-on-surface">
<!-- Top Navigation Anchor (Suppressed in Onboarding per JSON filter logic, but providing branding as per the task) -->
<header class="sticky top-0 w-full z-40 flex items-center justify-center px-margin-mobile py-8 bg-surface">
<h1 class="font-title-lg text-title-lg font-black text-primary">MinLish</h1>
</header>
<main class="flex-grow flex flex-col items-center justify-center px-margin-mobile">
<!-- Hero Illustration Section -->
<div class="relative w-full max-w-sm aspect-square mb-stack-lg flex items-center justify-center">
<!-- Background Decorative Elements -->
<div class="absolute inset-0 bg-secondary-container opacity-20 rounded-full blur-3xl"></div>
<div class="relative z-10 w-full h-full overflow-hidden rounded-[40px] shadow-sm">
<img alt="Student learning" class="w-full h-full object-cover" data-alt="A friendly, high-quality 3D digital illustration of a diverse student sitting comfortably in a modern, sun-drenched library. They are focused on a glowing digital tablet showing language learning flashcards. The atmosphere is warm and encouraging, featuring a sophisticated palette of soft teals, mint greens, and warm whites. Professional lighting creates soft shadows and a clean, Corporate Modern aesthetic consistent with a premium educational application." src="https://lh3.googleusercontent.com/aida-public/AB6AXuCstVMNmSzajzA5Os5m1fWEIL3Yot3jP6-7S4EXoH00ARiQM4JfY3CIT8dUWk-CXfaVPK7gJKgGeconU8Gf3RxlqSKPxRFfLPHcfUy2zLHIU7fCUUQz1tEGJtd1rcUcFHilF3DJL1qgE4FhkMr-tXdU4151M8VVt_6oznaDQR1LeIvARn2sfbxnEsQ_T-0vn1gZfbfzaFRRc1gpFBdTwEBhRYhip6s8TT2UEHF13xLyS88flehVo8jvJ2iq4IsrLQlDdoptuylpH5Y"/>
</div>
<!-- Floating Micro-interaction Element (Spaced Repetition Metaphor) -->
<div class="absolute -top-4 -right-2 bg-primary-container text-on-primary-container p-4 rounded-xl shadow-lg animate-bounce">
<span class="material-symbols-outlined text-on-primary-container">school</span>
</div>
</div>
<!-- Content Section -->
<div class="w-full max-w-sm text-center space-y-4">
<h2 class="font-headline-lg-mobile text-headline-lg-mobile text-on-surface">
                Learn vocabulary smarter with spaced repetition
            </h2>
<p class="font-body-lg text-body-lg text-on-surface-variant px-4">
                Unlock your language potential with scientifically proven methods that stick forever.
            </p>
</div>
</main>
<!-- Footer Controls -->
<footer class="w-full max-w-sm mx-auto p-margin-mobile space-y-8 mb-4">
<!-- Multi-step Indicator -->
<div class="flex justify-center gap-2">
<div class="h-2 rounded-full step-active transition-all duration-300"></div>
<div class="h-2 rounded-full step-inactive transition-all duration-300"></div>
<div class="h-2 rounded-full step-inactive transition-all duration-300"></div>
</div>
<!-- Action Buttons -->
<div class="flex flex-col gap-3">
<button class="w-full py-4 bg-primary text-on-primary font-label-lg text-label-lg rounded-full shadow-md active:scale-95 transition-transform duration-150 hover:bg-primary/90">
                Get Started
            </button>
<button class="w-full py-4 bg-secondary-container text-on-secondary-container font-label-lg text-label-lg rounded-full active:scale-95 transition-transform duration-150 hover:bg-secondary-container/80">
                Log in
            </button>
</div>
</footer>
<!-- Interactive Layer for Onboarding effects -->
<script>
        document.addEventListener('DOMContentLoaded', () => {
            const buttons = document.querySelectorAll('button');
            buttons.forEach(btn => {
                btn.addEventListener('click', () => {
                    console.log('Action triggered');
                });
            });

            // Gentle floating animation for the hero container
            const hero = document.querySelector('img');
            let angle = 0;
            function animate() {
                angle += 0.02;
                const y = Math.sin(angle) * 5;
                hero.parentElement.style.transform = `translateY(${y}px)`;
                requestAnimationFrame(animate);
            }
            animate();
        });
    </script>
</body></html>
