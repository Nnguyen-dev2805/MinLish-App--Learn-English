<body class="bg-surface text-on-surface min-h-screen pb-24">
<!-- TopAppBar -->
<header class="sticky top-0 w-full z-40 flex items-center justify-between px-margin-mobile py-4 bg-surface">
<div class="flex items-center gap-4">
<button class="p-2 hover:bg-surface-container-high transition-colors rounded-full active:opacity-80 transition-opacity">
<span class="material-symbols-outlined text-on-surface-variant" data-icon="arrow_back">arrow_back</span>
</button>
<h1 class="font-title-lg text-title-lg font-black text-primary">MinLish</h1>
</div>
<div class="flex items-center gap-2">
<span class="material-symbols-outlined text-on-surface-variant p-2 hover:bg-surface-container-high transition-colors rounded-full" data-icon="settings">settings</span>
<div class="w-8 h-8 rounded-full bg-secondary-container flex items-center justify-center overflow-hidden">
<img alt="User Profile" class="w-full h-full object-cover" src="https://lh3.googleusercontent.com/aida-public/AB6AXuBLgYzIDq6XQc8RUUOjHcuhPzAahdNjN-7SsOHv0cKWFgqZnGb3fBYQILT_ZUILwhZC3_y6rTI67JvYWaEiRJCjgZRZbL6MHBc3QlYXEoNYK4jpfKeCYgYHtgN9Kfm2W3TgtWf-h053byPBoeAAjlPWBFKZL1MO4qKEqSZ1ibG06q0X4nrqp2MNAvf2I1hQeN16HQotqH_rvSe8hRsE1SfaUIAukBZUyx6R-qwhdnEm7siQpHR7TaujkPXU9dHcvQmfkVzp3eWhNR4"/>
</div>
</div>
</header>
<main class="px-margin-mobile pt-4 max-w-2xl mx-auto">
<!-- Header Text -->
<div class="mb-stack-lg">
<h2 class="font-headline-lg-mobile text-headline-lg-mobile text-on-surface">Add New Word</h2>
<p class="font-body-md text-body-md text-on-surface-variant mt-1">Build your personal vocabulary deck with detailed context.</p>
</div>
<!-- Form Container -->
<div class="bg-surface-container-low rounded-[24px] p-stack-md border border-outline-variant/30">
<form class="flex flex-col gap-stack-md" id="vocab-form">
<!-- Deck Selector -->
<div class="flex flex-col gap-1.5">
<label class="font-label-lg text-label-lg text-on-surface ml-1">Select Deck</label>
<div class="relative">
<select class="w-full bg-surface-container-highest border border-outline-variant rounded-xl px-4 py-3 appearance-none font-body-lg text-body-lg focus:outline-none focus:ring-2 focus:ring-primary transition-all">
<option>Daily Essentials</option>
<option>Business English</option>
<option>Academic IELTS</option>
<option>Travel Phrases</option>
</select>
<span class="material-symbols-outlined absolute right-4 top-1/2 -translate-y-1/2 pointer-events-none text-on-surface-variant" data-icon="expand_more">expand_more</span>
</div>
</div>
<!-- Word & Pronunciation Grid -->
<div class="grid grid-cols-1 md:grid-cols-2 gap-stack-md">
<div class="flex flex-col gap-1.5">
<label class="font-label-lg text-label-lg text-on-surface ml-1">Word</label>
<input class="w-full bg-surface-container-lowest border border-outline-variant rounded-xl px-4 py-3 font-body-lg text-body-lg focus:outline-none focus:ring-2 focus:ring-primary transition-all" placeholder="e.g. Ephemeral" type="text"/>
</div>
<div class="flex flex-col gap-1.5">
<label class="font-label-lg text-label-lg text-on-surface ml-1">Pronunciation</label>
<div class="relative flex items-center">
<input class="w-full bg-surface-container-lowest border border-outline-variant rounded-xl px-4 py-3 font-body-lg text-body-lg focus:outline-none focus:ring-2 focus:ring-primary transition-all pr-12" placeholder="/əˈfem(ə)rəl/" type="text"/>
<span class="material-symbols-outlined absolute right-4 text-primary cursor-pointer hover:bg-primary-container/10 p-1 rounded-full transition-colors" data-icon="volume_up">volume_up</span>
</div>
</div>
</div>
<!-- Meaning -->
<div class="flex flex-col gap-1.5">
<label class="font-label-lg text-label-lg text-on-surface ml-1">Meaning (Native Language)</label>
<input class="w-full bg-surface-container-lowest border border-outline-variant rounded-xl px-4 py-3 font-body-lg text-body-lg focus:outline-none focus:ring-2 focus:ring-primary transition-all" placeholder="Thanh khiết, phù du, chóng tàn..." type="text"/>
</div>
<!-- English Description -->
<div class="flex flex-col gap-1.5">
<label class="font-label-lg text-label-lg text-on-surface ml-1">English Description</label>
<textarea class="w-full bg-surface-container-lowest border border-outline-variant rounded-xl px-4 py-3 font-body-lg text-body-lg focus:outline-none focus:ring-2 focus:ring-primary transition-all resize-none" placeholder="Lasting for a very short time." rows="2"></textarea>
</div>
<!-- Examples -->
<div class="flex flex-col gap-1.5">
<label class="font-label-lg text-label-lg text-on-surface ml-1">Examples</label>
<textarea class="w-full bg-surface-container-lowest border border-outline-variant rounded-xl px-4 py-3 font-body-lg text-body-lg focus:outline-none focus:ring-2 focus:ring-primary transition-all resize-none" placeholder="Fashions are ephemeral; style is eternal." rows="3"></textarea>
</div>
<!-- Secondary Context Grid -->
<div class="grid grid-cols-1 md:grid-cols-2 gap-stack-md">
<div class="flex flex-col gap-1.5">
<label class="font-label-lg text-label-lg text-on-surface ml-1">Collocations</label>
<textarea class="w-full bg-surface-container-lowest border border-outline-variant rounded-xl px-4 py-3 font-body-md text-body-md focus:outline-none focus:ring-2 focus:ring-primary transition-all resize-none" placeholder="ephemeral beauty, ephemeral nature" rows="2"></textarea>
</div>
<div class="flex flex-col gap-1.5">
<label class="font-label-lg text-label-lg text-on-surface ml-1">Related Words</label>
<textarea class="w-full bg-surface-container-lowest border border-outline-variant rounded-xl px-4 py-3 font-body-md text-body-md focus:outline-none focus:ring-2 focus:ring-primary transition-all resize-none" placeholder="transient, fleeting, momentary" rows="2"></textarea>
</div>
</div>
<!-- Personal Note -->
<div class="flex flex-col gap-1.5">
<label class="font-label-lg text-label-lg text-on-surface ml-1">Personal Note</label>
<textarea class="w-full bg-surface-container-lowest border border-outline-variant rounded-xl px-4 py-3 font-body-md text-body-md focus:outline-none focus:ring-2 focus:ring-primary transition-all resize-none" placeholder="Used often in literature and philosophical contexts." rows="2"></textarea>
</div>

<button class="w-full bg-primary text-on-primary py-4 rounded-full font-label-lg text-label-lg font-bold shadow-lg hover:bg-primary-container transition-all active:scale-[0.98] flex items-center justify-center gap-2" type="submit">
<span class="material-symbols-outlined" data-icon="save">save</span>
                        Save Word
                    </button>
</div>
</form>

<div class="mt-8 mb-12 p-stack-md border border-primary/20 bg-secondary-container/10 rounded-[24px] flex items-center justify-between">
<div class="flex flex-col gap-1">
<span class="font-label-md text-label-md text-primary font-bold uppercase tracking-wider">Your Stats</span>
<span class="font-body-md text-body-md text-on-surface-variant">Adding this word will bring your "Academic" deck to 42 items.</span>
</div>
<div class="w-12 h-12 flex items-center justify-center relative">
<svg class="w-full h-full -rotate-90">
<circle class="text-secondary-container" cx="24" cy="24" fill="none" r="20" stroke="currentColor" stroke-width="4"></circle>
<circle class="text-primary rounded-full" cx="24" cy="24" fill="none" r="20" stroke="currentColor" stroke-dasharray="125" stroke-dashoffset="35" stroke-width="4"></circle>
</svg>
<span class="absolute text-[10px] font-bold text-primary">72%</span>
</div>

<!-- BottomNavBar -->
<nav class="fixed bottom-0 left-0 w-full z-50 flex justify-around items-center px-2 py-3 pb-safe bg-surface">
<div class="flex flex-col items-center justify-center text-on-surface-variant p-2 hover:bg-surface-variant transition-colors cursor-pointer active:scale-95 transition-transform duration-150">
<span class="material-symbols-outlined" data-icon="home">home</span>
<span class="font-label-md text-label-md">Home</span>
</div>
<div class="flex flex-col items-center justify-center bg-secondary-container text-on-secondary-container rounded-full px-5 py-1 active:scale-95 transition-transform duration-150">
<span class="material-symbols-outlined" data-icon="style" style="font-variation-settings: 'FILL' 1;">style</span>
<span class="font-label-md text-label-md">Decks</span>
</div>
<div class="flex flex-col items-center justify-center text-on-surface-variant p-2 hover:bg-surface-variant transition-colors cursor-pointer active:scale-95 transition-transform duration-150">
<span class="material-symbols-outlined" data-icon="school">school</span>
<span class="font-label-md text-label-md">Learn</span>
</div>
<div class="flex flex-col items-center justify-center text-on-surface-variant p-2 hover:bg-surface-variant transition-colors cursor-pointer active:scale-95 transition-transform duration-150">
<span class="material-symbols-outlined" data-icon="leaderboard">leaderboard</span>
<span class="font-label-md text-label-md">Progress</span>
</div>
<div class="flex flex-col items-center justify-center text-on-surface-variant p-2 hover:bg-surface-variant transition-colors cursor-pointer active:scale-95 transition-transform duration-150">
<span class="material-symbols-outlined" data-icon="person">person</span>
<span class="font-label-md text-label-md">Profile</span>
</div>
</nav>
<script>
        document.getElementById('vocab-form').addEventListener('submit', function(e) {
            e.preventDefault();
            // Micro-interaction: Visual feedback on save
            const btn = e.target.querySelector('button[type="submit"]');
            const originalContent = btn.innerHTML;
            btn.innerHTML = '<span class="material-symbols-outlined animate-spin" data-icon="progress_activity">progress_activity</span> Saving...';
            btn.classList.add('opacity-80');
            
            setTimeout(() => {
                btn.innerHTML = '<span class="material-symbols-outlined" data-icon="check_circle">check_circle</span> Saved!';
                btn.classList.remove('bg-primary');
                btn.classList.add('bg-secondary');
                
                setTimeout(() => {
                    btn.innerHTML = originalContent;
                    btn.classList.remove('bg-secondary', 'opacity-80');
                    btn.classList.add('bg-primary');
                }, 2000);
            }, 800);
        });

        // Add visual interest to textareas on focus
        const inputs = document.querySelectorAll('input, textarea, select');
        inputs.forEach(input => {
            input.addEventListener('focus', () => {
                input.parentElement.querySelector('label')?.classList.add('text-primary');
            });
            input.addEventListener('blur', () => {
                input.parentElement.querySelector('label')?.classList.remove('text-primary');
            });
        });
    </script>
</body></html>
