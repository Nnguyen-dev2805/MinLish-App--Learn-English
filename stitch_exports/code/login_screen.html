<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Login - MinLish</title>

                        "on-secondary-fixed": "#00201e",
                        "tertiary-fixed-dim": "#ffba38",
                        "surface-container-high": "#e7e8e9",
                        "surface-dim": "#d9dadb",
                        "outline": "#6e7a76",
                        "inverse-surface": "#2e3132",
                        "on-surface": "#191c1d",
                        "secondary-fixed-dim": "#a2cfcb",
                        "on-secondary-container": "#3f6a67",
                        "background": "#f8f9fa",
                        "inverse-on-surface": "#f0f1f2",
                        "error-container": "#ffdad6",

                        "on-surface-variant": "#3e4946",
                        "tertiary-fixed": "#ffdeac",
                        "primary": "#005e53",
                        "surface-container": "#edeeef",
                        "inverse-primary": "#7ad7c6",
                        "error": "#ba1a1a",
                        "on-tertiary": "#ffffff",
                        "on-tertiary-container": "#ffeacf",
                        "surface-container-low": "#f3f4f5",
                        "on-tertiary-fixed-variant": "#604100",
                        "on-primary": "#ffffff",
                        "surface": "#f8f9fa",

                        "label-lg": ["14px", {"lineHeight": "20px", "letterSpacing": "0.1px", "fontWeight": "500"}]
                    }
                }
            }
        }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .m3-input:focus-within label {
            transform: translateY(-130%) scale(0.85);
            color: var(--tw-color-primary);
            background-color: #f8f9fa;
            padding: 0 4px;
        }
        .m3-input label {
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            pointer-events: none;
        }
        .bg-mesh {
            background-color: #f8f9fa;
            background-image: 
                radial-gradient(at 0% 0%, rgba(151, 243, 226, 0.15) 0px, transparent 50%),
                radial-gradient(at 100% 100%, rgba(187, 232, 228, 0.15) 0px, transparent 50%);
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-mesh min-h-screen flex flex-col font-body-md text-on-background">
<main class="flex-grow flex items-center justify-center px-margin-mobile md:px-margin-tablet py-stack-lg">
<div class="w-full max-w-md bg-surface-container-lowest rounded-[24px] p-stack-lg shadow-sm border border-outline-variant/30">
<header class="text-center mb-stack-lg">
<div class="inline-flex items-center justify-center w-16 h-16 bg-primary-container rounded-2xl mb-4">
<span class="material-symbols-outlined text-on-primary-container text-4xl" data-icon="school">school</span>
</div>
<h1 class="font-headline-lg-mobile text-headline-lg-mobile text-primary tracking-tight">MinLish</h1>
<p class="font-body-md text-on-surface-variant mt-2">Welcome back! Please login to continue your language journey.</p>
</header>
<form class="space-y-6" onsubmit="return false;">
<div class="relative m3-input group">
<input class="peer w-full h-14 px-4 font-body-lg bg-transparent border border-outline rounded-xl focus:border-primary focus:ring-1 focus:ring-primary outline-none transition-all" id="email" placeholder=" " required="" type="email"/>
<label class="absolute left-4 top-4 font-body-lg text-on-surface-variant peer-focus:text-primary peer-[:not(:placeholder-shown)]:text-primary peer-[:not(:placeholder-shown)]:scale-85 peer-[:not(:placeholder-shown)]:-translate-y-[130%] peer-[:not(:placeholder-shown)]:bg-surface-container-lowest peer-[:not(:placeholder-shown)]:px-1" for="email">Email address</label>
</div>
<div class="relative m3-input group">
<input class="peer w-full h-14 px-4 font-body-lg bg-transparent border border-outline rounded-xl focus:border-primary focus:ring-1 focus:ring-primary outline-none transition-all" id="password" placeholder=" " required="" type="password"/>
<label class="absolute left-4 top-4 font-body-lg text-on-surface-variant peer-focus:text-primary peer-[:not(:placeholder-shown)]:text-primary peer-[:not(:placeholder-shown)]:scale-85 peer-[:not(:placeholder-shown)]:-translate-y-[130%] peer-[:not(:placeholder-shown)]:bg-surface-container-lowest peer-[:not(:placeholder-shown)]:px-1" for="password">Password</label>
<button class="absolute right-4 top-4 text-on-surface-variant hover:text-primary transition-colors" type="button">
<span class="material-symbols-outlined" data-icon="visibility">visibility</span>
</button>
</div>
<div class="flex justify-end">
<a class="font-label-lg text-primary hover:underline transition-all" href="#">Forgot Password?</a>
</div>
<button class="w-full h-14 bg-primary text-on-primary font-label-lg rounded-full shadow-md hover:shadow-lg active:scale-[0.98] transition-all flex items-center justify-center gap-2" type="submit">
                    Log In
                    <span class="material-symbols-outlined text-[20px]" data-icon="login">login</span>
</button>
</form>
<div class="relative flex items-center my-stack-lg">
<div class="flex-grow border-t border-outline-variant"></div>
<span class="px-4 font-label-md text-on-surface-variant uppercase tracking-wider">Or continue with</span>
<div class="flex-grow border-t border-outline-variant"></div>
</div>
<button class="w-full h-14 bg-surface-container-high text-on-surface font-label-lg rounded-full border border-outline-variant/50 hover:bg-surface-variant transition-colors flex items-center justify-center gap-3">
<img alt="Google" class="w-5 h-5" src="https://lh3.googleusercontent.com/aida-public/AB6AXuDBMj6Xbw8CctUIZgO8pCkG75L-TEWqs9lgCPNooohpTyuqDH9gYhvdgcGZYWSBogRXQtB1tr4W2ICkML48XXLrIOGVG7g-AG_6tkuA1pNduwUu1H28hVjanYqi5MA3SDmoQZ1iXtHRoHFXW6ZG3FZ3hwi-gEflO5YIBQyLJFFQ3Oj-xtNpXEBl7EL-pRvyVapaPA-b0xofABWLBnwdlWVQuBzDt0iWV72s5_lRav1MVD0l4EeZbWMi8nrcXb8axvTKX-cV70l9IlA"/>
                Continue with Google
            </button>
<p class="text-center mt-stack-lg font-body-md text-on-surface-variant">
                Don't have an account? 
                <a class="font-label-lg text-primary hover:underline ml-1" href="#">Register</a>
</p>
</div>
</main>
<div class="fixed bottom-0 left-0 w-full p-4 pointer-events-none opacity-20 hidden md:block">
<div class="flex justify-between items-end">
<div class="w-48 h-48 bg-secondary-container rounded-full blur-3xl"></div>
<div class="w-64 h-64 bg-primary-fixed-dim rounded-full blur-3xl"></div>
</div>
</div>
<script>
        document.querySelectorAll('.m3-input input').forEach(input => {
            input.addEventListener('focus', () => {
                input.parentElement.classList.add('focused');
            });
            input.addEventListener('blur', () => {
                if (input.value === '') {
                    input.parentElement.classList.remove('focused');
                }
            });
        });

        // Simple login interaction feedback
        const loginBtn = document.querySelector('button[type="submit"]');
        loginBtn.addEventListener('click', (e) => {
            const email = document.getElementById('email').value;
            const pass = document.getElementById('password').value;
            if(email && pass) {
                loginBtn.innerHTML = '<span class="material-symbols-outlined animate-spin" data-icon="progress_activity">progress_activity</span>';
                setTimeout(() => {
                    loginBtn.innerHTML = 'Log In <span class="material-symbols-outlined text-[20px]" data-icon="login">login</span>';
                }, 2000);
            }
        });
    </script>
</body></html>
